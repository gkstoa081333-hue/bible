<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>새김 - 주일 설교 기록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/static/pretendard.min.css" />
<style>
:root{
  --bg-base:#121212; --bg-surface:#181818; --bg-elev:#1f1f1f; --bg-card:#252525; --bg-card2:#272727;
  --text:#ffffff; --text-muted:#b3b3b3; --text-near:#cbcbcb;
  --accent:#1ed760; --accent-hover:#1db954;
  --border:#4d4d4d; --border-light:#7c7c7c;
  --error:#f3727f; --warning:#ffa42b; --info:#539df5;
  --shadow-card:rgba(0,0,0,0.3) 0 8px 8px;
  --shadow-dialog:rgba(0,0,0,0.5) 0 8px 24px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Pretendard','SpotifyMixUI',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg-base); color:var(--text); line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}

/* ---------- Login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#1f1f1f 0%,#121212 60%)}
.login-card{background:var(--bg-surface);border-radius:12px;padding:40px 32px;width:100%;max-width:420px;box-shadow:var(--shadow-dialog)}
.login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:8px}
.login-logo-dot{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:18px}
.login-title{font-size:24px;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{color:var(--text-muted);text-align:center;font-size:14px;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1.4px}
.input{
  width:100%;background:var(--bg-elev);color:var(--text);border:none;outline:none;
  border-radius:500px;padding:14px 20px;font-size:15px;
  box-shadow:rgb(18,18,18) 0 1px 0, rgb(124,124,124) 0 0 0 1px inset;
}
.input:focus{box-shadow:rgb(18,18,18) 0 1px 0, var(--text) 0 0 0 1.5px inset}
.textarea{
  width:100%;background:var(--bg-elev);color:var(--text);border:none;outline:none;
  border-radius:10px;padding:14px 16px;font-size:15px;min-height:110px;resize:vertical;
  box-shadow:rgb(18,18,18) 0 1px 0, rgb(124,124,124) 0 0 0 1px inset;line-height:1.6;
}
.textarea:focus{box-shadow:rgb(18,18,18) 0 1px 0, var(--text) 0 0 0 1.5px inset}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 28px;border-radius:500px;font-size:14px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.6px;transition:transform .08s, background .15s;
}
.btn:hover{transform:scale(1.03)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#22e068}
.btn-ghost{background:var(--bg-elev);color:var(--text)}
.btn-ghost:hover{background:#2a2a2a}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border-light)}
.btn-danger{background:transparent;color:var(--error);border:1px solid var(--error)}
.btn-block{width:100%}
.btn-sm{padding:8px 16px;font-size:12px;letter-spacing:1.4px}

/* ---------- App layout ---------- */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--bg-base);border-right:1px solid #000;padding:24px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:0 8px}
.brand-dot{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:14px}
.brand-name{font-size:18px;font-weight:700}
.nav{display:flex;flex-direction:column;gap:4px}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;
  color:var(--text-muted);font-size:14px;font-weight:400;transition:background .15s, color .15s;
}
.nav-item:hover{background:#1a1a1a;color:var(--text)}
.nav-item.active{background:var(--bg-elev);color:var(--text);font-weight:700}
.nav-item .ico{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:16px}
.nav-section{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.4px;margin:18px 8px 8px;font-weight:700}
.sidebar-foot{margin-top:auto;padding:12px 8px;border-top:1px solid #2a2a2a}
.me-name{font-size:14px;font-weight:700}
.me-role{font-size:12px;color:var(--text-muted);margin-top:2px}
.logout-btn{margin-top:10px;font-size:12px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:1.4px}
.logout-btn:hover{color:var(--text)}

.main{padding:32px 40px;max-width:1200px;width:100%}
.page-title{font-size:28px;font-weight:700;margin-bottom:6px}
.page-sub{color:var(--text-muted);font-size:14px;margin-bottom:24px}

/* ---------- Cards ---------- */
.card{background:var(--bg-surface);border-radius:8px;padding:20px;margin-bottom:14px;transition:background .15s}
.card:hover{background:var(--bg-elev)}
.card-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.card-title{font-size:18px;font-weight:600}
.card-meta{font-size:12px;color:var(--text-muted);display:flex;gap:10px;flex-wrap:wrap}
.tag{display:inline-block;background:var(--bg-card);color:var(--text-near);font-size:11px;font-weight:600;padding:3px 10px;border-radius:9999px;letter-spacing:.2px}
.tag-accent{background:rgba(30,215,96,.15);color:var(--accent)}
.tag-warning{background:rgba(255,164,43,.15);color:var(--warning)}
.section{margin-top:10px}
.section h4{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:4px;font-weight:700}
.section p{font-size:14px;color:var(--text-near);white-space:pre-wrap;line-height:1.7}

/* ---------- Stats ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--bg-surface);border-radius:8px;padding:18px 20px}
.stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.4px;font-weight:700;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700}
.stat-sub{font-size:12px;color:var(--text-muted);margin-top:2px}

/* ---------- Table ---------- */
.table-wrap{background:var(--bg-surface);border-radius:8px;overflow:hidden;box-shadow:var(--shadow-card)}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 16px;text-align:left;font-size:14px}
thead th{
  background:var(--bg-elev);color:var(--text-muted);font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.4px;border-bottom:1px solid #2a2a2a;
}
tbody tr{border-bottom:1px solid #1f1f1f;transition:background .15s}
tbody tr:hover{background:var(--bg-elev)}
tbody tr:last-child{border-bottom:none}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--text-muted);transition:background .15s, color .15s}
.icon-btn:hover{background:#2a2a2a;color:var(--text)}

/* ---------- Form / Modal ---------- */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.search-input{
  background:var(--bg-elev);border:none;outline:none;color:var(--text);
  padding:10px 18px;border-radius:500px;min-width:220px;
  box-shadow:rgb(18,18,18) 0 1px 0, rgb(124,124,124) 0 0 0 1px inset;font-size:13px;
}
.select{
  background:var(--bg-elev);border:none;outline:none;color:var(--text);
  padding:10px 18px;border-radius:500px;font-size:13px;
  box-shadow:rgb(18,18,18) 0 1px 0, rgb(124,124,124) 0 0 0 1px inset;
}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.modal{background:var(--bg-surface);border-radius:12px;padding:28px;width:100%;max-width:560px;box-shadow:var(--shadow-dialog);max-height:90vh;overflow-y:auto}
.modal-title{font-size:20px;font-weight:700;margin-bottom:18px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:560px){.form-row{grid-template-columns:1fr}}

/* ---------- Detail / Sharing mode ---------- */
.detail-wrap{background:var(--bg-surface);border-radius:12px;padding:32px;box-shadow:var(--shadow-card)}
.detail-head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.detail-title{font-size:24px;font-weight:700}
.detail-meta{color:var(--text-muted);font-size:13px;margin-top:6px}
.detail-section{margin-top:22px}
.detail-section h3{font-size:13px;text-transform:uppercase;letter-spacing:1.4px;color:var(--accent);font-weight:700;margin-bottom:8px}
.detail-section p{font-size:16px;color:var(--text);white-space:pre-wrap;line-height:1.8}

/* ---------- Toast / Empty ---------- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-elev);color:var(--text);padding:14px 24px;border-radius:9999px;box-shadow:var(--shadow-dialog);z-index:200;font-size:14px;font-weight:600}
.toast.error{background:var(--error);color:#000}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-emoji{font-size:48px;margin-bottom:12px;opacity:.5}

/* ---------- Mobile ---------- */
@media (max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;flex-direction:row;align-items:center;padding:12px 16px;border-right:none;border-bottom:1px solid #2a2a2a;overflow-x:auto}
  .brand{margin-bottom:0;margin-right:16px;flex-shrink:0}
  .nav{flex-direction:row;gap:4px;flex:1}
  .nav-item{padding:8px 12px;white-space:nowrap;font-size:13px}
  .nav-section,.sidebar-foot{display:none}
  .main{padding:20px 16px}
  .page-title{font-size:22px}
  .stat-value{font-size:22px}
  th,td{padding:10px 12px;font-size:13px}
  .detail-wrap{padding:20px}
  .detail-title{font-size:20px}
}

/* utility */
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.gap-2{gap:8px}.gap-3{gap:12px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mb-3{margin-bottom:12px}
.hidden{display:none!important}
.text-muted{color:var(--text-muted)}
.text-accent{color:var(--accent)}

/* reaction & comments */
.react-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;padding-top:16px;border-top:1px solid #2a2a2a}
.react-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg-elev);color:var(--text-near);
  padding:8px 14px;border-radius:9999px;font-size:13px;font-weight:600;
  border:1px solid transparent;transition:all .15s;
}
.react-btn:hover{background:#2a2a2a;color:var(--text)}
.react-btn.active{background:rgba(30,215,96,.12);color:var(--accent);border-color:var(--accent)}
.react-btn .emoji{font-size:15px}
.react-btn .count{font-size:12px;color:var(--text-muted);font-weight:700;margin-left:2px}
.react-btn.active .count{color:var(--accent)}
.react-meta{font-size:12px;color:var(--text-muted);margin-left:auto;align-self:center}

.comment-section{margin-top:20px;padding-top:18px;border-top:1px solid #2a2a2a}
.comment-section h4{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text-muted);font-weight:700;margin-bottom:12px}
.comment-item{background:var(--bg-elev);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.comment-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.comment-name{font-size:13px;font-weight:700}
.comment-time{font-size:11px;color:var(--text-muted)}
.comment-text{font-size:14px;color:var(--text-near);white-space:pre-wrap;line-height:1.5}
.comment-del{font-size:11px;color:var(--text-muted);margin-left:8px}
.comment-del:hover{color:var(--error)}
.comment-input-wrap{display:flex;gap:8px;align-items:flex-end;margin-top:10px}
.comment-input-wrap textarea{flex:1;min-height:44px}

.card-counts{display:inline-flex;gap:10px;font-size:12px;color:var(--text-muted);margin-top:6px}
.card-counts span{display:inline-flex;align-items:center;gap:3px}

/* feeling chips */
.chip-grid{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg-elev);color:var(--text-near);
  padding:8px 14px;border-radius:9999px;font-size:13px;font-weight:600;
  border:1px solid transparent;cursor:pointer;transition:all .15s;user-select:none;
}
.chip:hover{background:#2a2a2a}
.chip.active{background:rgba(30,215,96,.12);color:var(--accent);border-color:var(--accent)}
.chip .emoji{font-size:14px}

/* photo upload */
.photo-input{display:none}
.photo-zone{
  border:2px dashed var(--border);border-radius:12px;
  padding:32px 16px;text-align:center;cursor:pointer;
  background:var(--bg-elev);transition:all .15s;
}
.photo-zone:hover{border-color:var(--accent);background:#222}
.photo-zone .ico{font-size:32px;opacity:.6;margin-bottom:8px}
.photo-zone .label{font-size:14px;font-weight:600}
.photo-zone .hint{font-size:12px;color:var(--text-muted);margin-top:4px}
.photo-preview{position:relative;border-radius:12px;overflow:hidden;background:#000}
.photo-preview img{display:block;width:100%;max-height:400px;object-fit:contain}
.photo-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;font-weight:700}
.photo-remove:hover{background:var(--error)}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;background:#000;cursor:pointer;display:block}
.qt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}

/* badges */
.badge-shelf{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg-card);padding:6px 12px;border-radius:9999px;
  font-size:12px;font-weight:700;border:1px solid #333;
}
.badge.earned{background:rgba(30,215,96,.12);color:var(--accent);border-color:var(--accent)}
.badge.locked{opacity:.35}
.badge .emoji{font-size:14px}
.badge-current{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,rgba(30,215,96,.2),rgba(30,215,96,.05));
  border:1px solid var(--accent);padding:10px 18px;border-radius:9999px;
}
.badge-current .emoji{font-size:24px}
.badge-current .name{font-weight:700;font-size:15px}
.badge-current .progress{font-size:11px;color:var(--text-muted)}

.progress-bar{height:6px;background:var(--bg-elev);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-dot">새</div>
    </div>
    <div class="login-title">새김</div>
    <div class="login-sub">주일에 들은 말씀을 마음에 새기다</div>
    <div class="field">
      <label>아이디</label>
      <input id="loginId" class="input" placeholder="관리자가 발급한 아이디" autocomplete="username" />
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input id="loginPw" type="password" class="input" placeholder="비밀번호" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary btn-block mt-3" onclick="login()">로그인</button>
    <div class="text-muted mt-3" style="text-align:center;font-size:12px">
      계정이 없다면 관리자에게 문의하세요
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="appView" class="app hidden">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-dot">새</div>
      <div class="brand-name">새김</div>
    </div>
    <nav class="nav" id="navList">
      <button class="nav-item active" data-page="write"><span class="ico">✎</span> 새 기록</button>
      <button class="nav-item" data-page="mine"><span class="ico">♪</span> 내 기록</button>
      <button class="nav-item" data-page="group"><span class="ico">◉</span> 소그룹 나눔</button>
      <button class="nav-item" data-page="sharing"><span class="ico">▶</span> 나눔 모드</button>
      <button class="nav-item" data-page="quiet"><span class="ico">✦</span> 묵상 인증</button>
      <button class="nav-item hidden" data-page="admin" id="navAdmin"><span class="ico">⚙</span> 관리자</button>
    </nav>
    <div class="sidebar-foot">
      <div class="me-name" id="meName">-</div>
      <div class="me-role" id="meRole">-</div>
      <div id="meBadge" style="margin-top:6px"></div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <!-- pages injected here -->
  </main>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

/* 느낀점 옵션 (체크박스용) */

/* 메달 시스템 (묵상 인증 횟수 기반) */
const BADGES = [
  { count:1,   emoji:'🌱', name:'새싹' },
  { count:5,   emoji:'🌿', name:'잎' },
  { count:10,  emoji:'🌳', name:'나무' },
  { count:20,  emoji:'🌺', name:'꽃나무' },
  { count:50,  emoji:'🏆', name:'사명자' },
  { count:100, emoji:'👑', name:'면류관' },
];

function currentBadge(n) {
  let cur = null, next = BADGES[0];
  for (let i = 0; i < BADGES.length; i++) {
    if (n >= BADGES[i].count) { cur = BADGES[i]; next = BADGES[i+1] || null; }
  }
  return { current: cur, next };
}

/* 이미지 압축 (canvas) - max 1024px, JPEG 0.75 */
function compressImage(file, maxDim = 1024, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const lastSunday = () => {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay()); // back to Sunday
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const fmtDate = (s) => {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${y}.${m}.${d}`;
};

function toast(msg, type='') {
  const root = $('#toastRoot');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>el.remove(), 2400);
}

function showModal(html) {
  const root = $('#modalRoot');
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() { $('#modalRoot').innerHTML = ''; }

/* -------- 4. 인증 (간단 username/pw, Firebase RTDB 저장) -------- */
async function login() {
  const id = $('#loginId').value.trim();
  const pw = $('#loginPw').value;
  if (!id || !pw) { toast('아이디와 비밀번호를 입력하세요','error'); return; }

  try {
    const snap = await db.ref('users').orderByChild('username').equalTo(id).once('value');
    const data = snap.val();
    if (!data) { toast('계정을 찾을 수 없습니다','error'); return; }
    const userId = Object.keys(data)[0];
    const user = data[userId];
    if (user.password !== pw) { toast('비밀번호가 일치하지 않습니다','error'); return; }

    state.me = { id: userId, ...user };
    localStorage.setItem('saekim_session', JSON.stringify(state.me));
    enterApp();
  } catch(e) {
    console.error(e);
    toast('로그인 실패. Firebase 설정을 확인하세요','error');
  }
}

function logout() {
  localStorage.removeItem('saekim_session');
  state.me = null;
  location.reload();
}

function enterApp() {
  $('#loginView').classList.add('hidden');
  $('#appView').classList.remove('hidden');
  $('#meName').textContent = state.me.name + ' (' + (state.me.group || '미배정') + ')';
  $('#meRole').textContent = state.me.role === 'admin' ? '관리자' : '회원';
  if (state.me.role === 'admin') $('#navAdmin').classList.remove('hidden');

  $$('.nav-item').forEach(b => b.addEventListener('click', e => {
    const page = e.currentTarget.dataset.page;
    navigate(page);
  }));
  navigate('write');
  refreshMyBadge();
}

async function refreshMyBadge() {
  try {
    const snap = await db.ref('quietTimes').orderByChild('userId').equalTo(state.me.id).once('value');
    const n = Object.keys(snap.val()||{}).length;
    const { current } = currentBadge(n);
    const el = $('#meBadge');
    if (!el) return;
    if (current) {
      el.innerHTML = `<span class="badge earned" style="font-size:11px"><span class="emoji">${current.emoji}</span><span>${current.name} · ${n}회</span></span>`;
    } else {
      el.innerHTML = `<span class="text-muted" style="font-size:11px">묵상 인증 0회</span>`;
    }
  } catch(e) {}
}

/* -------- 5. 라우팅 -------- */
function navigate(page) {
  state.page = page;
  $$('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  if (page === 'write') renderWrite();
  else if (page === 'mine') renderMine();
  else if (page === 'group') renderGroup();
  else if (page === 'sharing') renderSharing();
  else if (page === 'quiet') renderQuiet();
  else if (page === 'admin') renderAdmin();
}

function applySermonPreset() {
  const id = $('#f_sermon').value;
  if (!id) return;
  const s = (state._sermonsCache || []).find(x => x.id === id);
  if (!s) return;
  if (s.date) $('#f_date').value = s.date;
  if (s.title) $('#f_title').value = s.title;
  if (s.preacher) $('#f_preacher').value = s.preacher;
  if (s.mainVerse) $('#f_verse').value = s.mainVerse;
  toast('설교 정보가 자동 입력되었습니다');
}

async function saveRecord(editId) {
  // 설교자: select가 있으면 select 값, 비어있으면 custom 입력값 사용
  let preacher = '';
  const sel = $('#f_preacher');
  if (sel && sel.tagName === 'SELECT') {
    preacher = sel.value || ($('#f_preacher_custom')?.value || '').trim();
  } else if (sel) {
    preacher = sel.value.trim();
  }
  // 느낀점 chips
  const feelings = [...$$('#f_feelings .chip.active')].map(c => c.dataset.value);

  const payload = {
    userId: state.me.id,
    userName: state.me.name,
    group: state.me.group || '미배정',
    sermonDate: $('#f_date').value,
    sermonTitle: $('#f_title').value.trim(),
    preacher,
    mainVerse: $('#f_verse').value.trim(),
    feelings,
    feelingNote: $('#f_feelingNote').value.trim(),
    memorable: $('#f_memorable').value.trim(),
    resolution: $('#f_resolution').value.trim(),
    updatedAt: Date.now(),
  };
  if (!payload.sermonDate) { toast('설교 날짜를 입력하세요','error'); return; }
  if (feelings.length === 0 && !payload.feelingNote && !payload.memorable && !payload.resolution) {
    toast('느낀점·구절·결심 중 하나는 작성해주세요','error'); return;
  }

  try {
    if (editId) {
      await db.ref('records/' + editId).update(payload);
      toast('수정되었습니다');
    } else {
      payload.createdAt = Date.now();
      await db.ref('records').push(payload);
      toast('저장되었습니다');
    }
    navigate('mine');
  } catch(e) { console.error(e); toast('저장 실패','error'); }
}

// 카드별 공감/댓글 카운트 비동기 로딩 (목록 그린 직후 호출)
async function loadCardCounts(recordIds) {
  for (const id of recordIds) {
    try {
      const [rSnap, cSnap] = await Promise.all([
        db.ref('reactions/' + id).once('value'),
        db.ref('comments/' + id).once('value'),
      ]);
      const reactions = rSnap.val() || {};
      const comments = cSnap.val() || {};
      const counts = { love:0, pray:0, grace:0 };
      Object.values(reactions).forEach(r => { if (counts[r.type] !== undefined) counts[r.type]++; });
      const cCount = Object.keys(comments).length;
      const el = document.getElementById('counts-' + id);
      if (!el) continue;
      const parts = [];
      if (counts.love) parts.push(`<span>❤️ ${counts.love}</span>`);
      if (counts.pray) parts.push(`<span>🙏 ${counts.pray}</span>`);
      if (counts.grace) parts.push(`<span>✨ ${counts.grace}</span>`);
      if (cCount) parts.push(`<span>💬 ${cCount}</span>`);
      el.innerHTML = parts.join('');
    } catch(e) {}
  }
}

/* -------- 공감 (reactions) -------- */
const REACTION_TYPES = [
  { type:'love',  emoji:'❤️', label:'공감' },
  { type:'pray',  emoji:'🙏', label:'기도' },
  { type:'grace', emoji:'✨', label:'은혜' },
];

async function loadReactionBar(recordId, mountId) {
  const snap = await db.ref('reactions/' + recordId).once('value');
  const reactions = snap.val() || {};
  const mine = reactions[state.me.id]?.type || null;
  const counts = { love:0, pray:0, grace:0 };
  Object.values(reactions).forEach(r => { if (counts[r.type] !== undefined) counts[r.type]++; });
  const total = Object.keys(reactions).length;
  const html = `
    <div class="react-bar">
      ${REACTION_TYPES.map(rt => `
        <button class="react-btn ${mine===rt.type?'active':''}" onclick="toggleReaction('${recordId}','${rt.type}','${mountId}')">
          <span class="emoji">${rt.emoji}</span>
          <span>${rt.label}</span>
          <span class="count">${counts[rt.type]||''}</span>
        </button>
      `).join('')}
      <span class="react-meta">${total ? total + '명이 공감했어요' : '첫 공감을 남겨보세요'}</span>
    </div>
  `;
  const el = document.getElementById(mountId);
  if (el) el.innerHTML = html;
}

async function toggleReaction(recordId, type, mountId) {
  const ref = db.ref(`reactions/${recordId}/${state.me.id}`);
  const cur = await ref.once('value');
  const v = cur.val();
  if (v && v.type === type) {
    await ref.remove(); // 같은 종류 다시 누르면 취소
  } else {
    await ref.set({ type, name: state.me.name, at: Date.now() });
  }
  loadReactionBar(recordId, mountId);
}

/* -------- 댓글 (comments) -------- */
async function loadCommentBox(recordId, mountId) {
  const snap = await db.ref('comments/' + recordId).once('value');
  const data = snap.val() || {};
  const list = Object.entries(data).map(([id,c])=>({id,...c}))
    .sort((a,b)=> (a.createdAt||0) - (b.createdAt||0));

  const items = list.map(c => {
    const canDel = c.userId === state.me.id || state.me.role === 'admin';
    return `
      <div class="comment-item">
        <div class="comment-head">
          <div class="comment-name">${esc(c.userName)}</div>
          <div class="row gap-2">
            <span class="comment-time">${fmtRelative(c.createdAt)}</span>
            ${canDel ? `<button class="comment-del" onclick="deleteComment('${recordId}','${c.id}','${mountId}')">삭제</button>`:''}
          </div>
        </div>
        <div class="comment-text">${esc(c.text)}</div>
      </div>
    `;
  }).join('');

  const html = `
    <div class="comment-section">
      <h4>댓글 ${list.length ? `· ${list.length}` : ''}</h4>
      ${items || '<div class="text-muted" style="font-size:13px;padding:8px 0">아직 댓글이 없어요. 첫 댓글을 남겨보세요.</div>'}
      <div class="comment-input-wrap">
        <textarea id="cmtInput-${recordId}" class="textarea" style="min-height:44px" placeholder="댓글 남기기..."></textarea>
        <button class="btn btn-primary btn-sm" onclick="addComment('${recordId}','${mountId}')">등록</button>
      </div>
    </div>
  `;
  const el = document.getElementById(mountId);
  if (el) el.innerHTML = html;
}

async function addComment(recordId, mountId) {
  const text = $('#cmtInput-' + recordId).value.trim();
  if (!text) return;
  await db.ref('comments/' + recordId).push({
    userId: state.me.id,
    userName: state.me.name,
    group: state.me.group || '',
    text,
    createdAt: Date.now(),
  });
  loadCommentBox(recordId, mountId);
}

async function deleteComment(recordId, commentId, mountId) {
  if (!confirm('이 댓글을 삭제할까요?')) return;
  await db.ref(`comments/${recordId}/${commentId}`).remove();
  loadCommentBox(recordId, mountId);
}

function fmtRelative(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const m = Math.floor(diff/60000);
  if (m < 1) return '방금';
  if (m < 60) return `${m}분 전`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h}시간 전`;
  const d = Math.floor(h/24);
  if (d < 7) return `${d}일 전`;
  return new Date(ts).toLocaleDateString('ko-KR');
}

async function refreshSharingDates() {
  const grp = $('#sh_group').value;
  let snap;
  if (grp === '__all__') {
    snap = await db.ref('records').once('value');
  } else {
    snap = await db.ref('records').orderByChild('group').equalTo(grp).once('value');
  }

async function startSharing() {
  const grp = $('#sh_group').value;
  const date = $('#sh_date').value;

  let snap;
  if (grp === '__all__') snap = await db.ref('records').once('value');
  else snap = await db.ref('records').orderByChild('group').equalTo(grp).once('value');

  let list = Object.entries(snap.val()||{}).map(([id,r])=>({id,...r}));
  if (date) list = list.filter(r => r.sermonDate === date);
  list.sort((a,b) => (a.userName||'').localeCompare(b.userName||''));

  if (list.length === 0) { toast('해당 조건에 기록이 없습니다','error'); return; }

  state._shareList = list;
  state._shareIdx = 0;
  $('#shareSetup').classList.add('hidden');
  $('#shareStage').classList.remove('hidden');
  renderShareSlide();
  // 키보드 단축키
  state._shareKeyHandler = (e) => {
    // 입력 필드 포커스 시 단축키 무시
    const tag = (e.target.tagName || '').toUpperCase();
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (e.key === 'ArrowRight') shareNext();
    else if (e.key === 'ArrowLeft') sharePrev();
    else if (e.key === 'Escape') exitSharing();
  };
  document.addEventListener('keydown', state._shareKeyHandler);
}

function renderShareSlide() {
  const r = state._shareList[state._shareIdx];
  const total = state._shareList.length;
  const idx = state._shareIdx + 1;
  const feelings = Array.isArray(r.feelings) ? r.feelings : [];
  const feelingNote = r.feelingNote || (typeof r.feeling === 'string' ? r.feeling : '');
  const feelingChips = feelings.length ? `<div class="chip-grid" style="margin-top:8px">${
    feelings.map(v => {
      const opt = FEELING_OPTIONS.find(o => o.value === v);
      return `<span class="chip active" style="cursor:default"><span class="emoji">${opt?opt.emoji:'•'}</span><span>${esc(v)}</span></span>`;
    }).join('')
  }</div>` : '';

  $('#shareStage').innerHTML = `
    <div class="detail-wrap" style="position:relative">
      <div class="detail-head">
        <div>
          <div class="row gap-2">
            <span class="tag tag-accent" style="font-size:13px;padding:5px 14px">${idx} / ${total}</span>
            <span class="tag" style="font-size:13px;padding:5px 14px">${esc(r.userName)} · ${esc(r.group||'미배정')}</span>
          </div>
          <div class="detail-title" style="margin-top:14px;font-size:28px">${esc(r.sermonTitle || '(제목 없음)')}</div>
          <div class="detail-meta">
            ${esc(fmtDate(r.sermonDate))}
            ${r.preacher ? ' · ' + esc(r.preacher) : ''}
            ${r.mainVerse ? ' · ' + esc(r.mainVerse) : ''}
          </div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="exitSharing()">나가기 (ESC)</button>
      </div>
      ${feelings.length || feelingNote ? `<div class="detail-section"><h3>느낀점</h3>${feelingChips}${feelingNote?`<p style="margin-top:8px">${esc(feelingNote)}</p>`:''}</div>`:''}
      ${r.memorable ? `<div class="detail-section"><h3>기억에 남는 구절</h3><p>${esc(r.memorable)}</p></div>`:''}
      ${r.resolution ? `<div class="detail-section"><h3>실천·결심</h3><p>${esc(r.resolution)}</p></div>`:''}
      <div id="shareReact"></div>
      <div id="shareComment"></div>
    </div>
    <div class="row" style="justify-content:space-between;margin-top:20px">
      <button class="btn btn-ghost" onclick="sharePrev()" ${state._shareIdx===0?'disabled style="opacity:.4;cursor:not-allowed"':''}>← 이전</button>
      <div class="text-muted" style="font-size:12px">키보드 ← → 로도 이동 가능</div>
      <button class="btn btn-primary" onclick="shareNext()" ${state._shareIdx===total-1?'disabled style="opacity:.4;cursor:not-allowed"':''}>다음 →</button>
    </div>
  `;
  loadReactionBar(r.id, 'shareReact');
  loadCommentBox(r.id, 'shareComment');
}

function shareNext() { if (state._shareIdx < state._shareList.length-1) { state._shareIdx++; renderShareSlide(); } }
function sharePrev() { if (state._shareIdx > 0) { state._shareIdx--; renderShareSlide(); } }
function exitSharing() {
  if (state._shareKeyHandler) document.removeEventListener('keydown', state._shareKeyHandler);
  state._shareKeyHandler = null;
  renderSharing();
}

function lazyLoadQuietThumbs() {
  $$('[id^="qtThumb-"]').forEach(async (img) => {
    const id = img.id.replace('qtThumb-', '');
    if (img.dataset.loaded) return;
    try {
      const snap = await db.ref('quietPhotos/' + id).once('value');
      const photo = snap.val();
      if (photo) {
        img.src = photo;
        img.style.display = 'block';
        const ph = document.getElementById('qtPlaceholder-' + id);
        if (ph) ph.style.display = 'none';
        img.dataset.loaded = '1';
      }
    } catch(e) {}
  });
}

async function saveQuietTime() {
  const date = $('#q_date').value;
  const verse = $('#q_verse').value.trim();
  const note = $('#q_note').value.trim();
  if (!date) { toast('날짜를 입력하세요','error'); return; }
  if (!state._photoData && !note) { toast('사진 또는 메모 중 하나는 필요해요','error'); return; }

  const btn = $('#q_save_btn');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    const newRef = await db.ref('quietTimes').push({
      userId: state.me.id,
      userName: state.me.name,
      group: state.me.group || '미배정',
      date, verse, note,
      hasPhoto: !!state._photoData,
      createdAt: Date.now(),
    });
    // 사진은 별도 노드에 저장 (lazy-loading)
    if (state._photoData) {
      await db.ref('quietPhotos/' + newRef.key).set(state._photoData);
    }
    toast('인증되었습니다!');
    state._photoData = null;
    closeModal();
    await refreshQuietHeader(); // 메달 갱신
    await refreshQuietList();
    refreshMyBadge();
    // 새 메달 획득 알림
    const snap = await db.ref('quietTimes').orderByChild('userId').equalTo(state.me.id).once('value');
    const cnt = Object.keys(snap.val()||{}).length;
    const newBadge = BADGES.find(b => b.count === cnt);
    if (newBadge) {
      setTimeout(() => toast(`🎉 새 메달 획득: ${newBadge.emoji} ${newBadge.name}!`), 500);
    }
  } catch(e) {
    console.error(e);
    toast('저장 실패','error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '인증하기'; }
  }
}

function renderAttendance(recArr) {
  // group by sermonDate × userName
  const dates = [...new Set(recArr.map(r=>r.sermonDate).filter(Boolean))].sort().reverse().slice(0, 8);
  const users = Object.values(state.users).filter(u=>u.role!=='admin').sort((a,b)=>(a.group||'').localeCompare(b.group||'')||(a.name||'').localeCompare(b.name||''));
  const map = {};
  recArr.forEach(r => {
    if (!r.sermonDate) return;
    map[r.sermonDate] = map[r.sermonDate] || {};
    map[r.sermonDate][r.userId] = true;
  });

  if (dates.length === 0 || users.length === 0) {
    $('#attendance').innerHTML = `<div class="empty">데이터가 없습니다</div>`;

        ${users.map(u => {

async function saveUser(editId) {
  const payload = {
    name: $('#u_name').value.trim(),
    username: $('#u_username').value.trim(),
    password: $('#u_password').value,
    group: $('#u_group').value.trim(),
    role: $('#u_role').value,

      payload.createdAt = Date.now();

    renderAdmin();

async function batchSermonImport() {
  const text = $('#batch_text').value.trim();
  if (!text) { toast('입력 내용이 없습니다','error'); return; }
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  let success = 0, fail = 0;
  for (const line of lines) {
    const parts = line.split(',').map(p=>p.trim());
    const [date, title, preacher='', mainVerse=''] = parts;
    if (!date || !title || !/^\d{4}-\d{2}-\d{2}$/.test(date)) { fail++; continue; }
    try {
      await db.ref('sermons').push({ date, title, preacher, mainVerse, createdAt: Date.now() });
      success++;
    } catch(e) { fail++; }
  }
  toast(`등록 완료: ${success}건${fail?` / 실패 ${fail}건`:''}`);
  closeModal();
  renderAdmin();
}

/* -------- Charts (Chart.js) -------- */
let _chartMonthly = null, _chartByUser = null;

function renderCharts(recArr) {
  // 1) 월별 제출 건수 (최근 6개월)
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  const monthlyCounts = months.map(m =>
    recArr.filter(r => (r.sermonDate||'').startsWith(m)).length
  );

  if (_chartMonthly) _chartMonthly.destroy();
  const ctx1 = document.getElementById('chartMonthly');
  if (ctx1) {
    _chartMonthly = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: months.map(m => m.slice(5) + '월'),
        datasets: [{
          label: '제출 건수',
          data: monthlyCounts,
          backgroundColor: '#1ed760',
          borderRadius: 6,
        }]
      },
      options: chartBaseOptions()
    });
  }

  // 2) 사용자별 누적 (회원만, 0건 포함)
  const memberUsers = Object.values(state.users).filter(u => u.role !== 'admin');
  const userCounts = memberUsers.map(u => ({
    name: u.name,
    count: recArr.filter(r => r.userId && state.users[r.userId]?.username === u.username || r.userName === u.name).length
  })).sort((a,b) => b.count - a.count);

  if (_chartByUser) _chartByUser.destroy();
  const ctx2 = document.getElementById('chartByUser');
  if (ctx2) {
    // 사용자 수에 맞춰 캔버스 높이 조정
    const h = Math.max(240, memberUsers.length * 26);
    ctx2.parentElement.style.height = h + 'px';
    _chartByUser = new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: userCounts.map(u => u.name),
        datasets: [{
          label: '누적 제출',
          data: userCounts.map(u => u.count),
          backgroundColor: '#1ed760',
          borderRadius: 4,
        }]
      },
      options: { ...chartBaseOptions(), indexAxis: 'y' }
    });
  }
}

function chartBaseOptions() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { backgroundColor: '#252525', borderColor: '#4d4d4d', borderWidth: 1, titleColor:'#fff', bodyColor:'#cbcbcb' }
    },
    scales: {
      x: { ticks: { color: '#b3b3b3', font:{family:'Pretendard'} }, grid: { color: '#2a2a2a', drawBorder:false } },
      y: { ticks: { color: '#b3b3b3', font:{family:'Pretendard'}, precision: 0 }, grid: { color: '#2a2a2a', drawBorder:false }, beginAtZero: true }
    }
  };
}

/* -------- Excel export -------- */
function exportUsersXlsx() {
  const rows = Object.values(state.users).map(u => ({
    이름: u.name, 아이디: u.username, 소그룹: u.group||'', 권한: u.role==='admin'?'관리자':'회원',
    비밀번호: u.password, 생성일: u.createdAt ? new Date(u.createdAt).toLocaleString('ko-KR') : ''
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '사용자');
  XLSX.writeFile(wb, `새김_사용자_${todayStr()}.xlsx`);
}

async function exportRecordsXlsx() {
  const snap = await db.ref('records').once('value');
  const data = snap.val() || {};
  const rows = Object.values(data)
    .sort((a,b)=> (b.sermonDate||'').localeCompare(a.sermonDate||''))
    .map(r => {
      const feelings = Array.isArray(r.feelings) ? r.feelings.join(', ') : '';
      const note = r.feelingNote || (typeof r.feeling === 'string' ? r.feeling : '');
      return {
        설교날짜: r.sermonDate||'', 이름: r.userName||'', 소그룹: r.group||'',
        설교제목: r.sermonTitle||'', 설교자: r.preacher||'', 본문말씀: r.mainVerse||'',
        느낀점태그: feelings, 느낀점메모: note,
        기억에남는구절: r.memorable||'', 실천결심: r.resolution||'',
        작성일: r.createdAt ? new Date(r.createdAt).toLocaleString('ko-KR') : ''
      };
    });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:10},{wch:14},{wch:24},{wch:10},{wch:16},{wch:30},{wch:36},{wch:36},{wch:36},{wch:18}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '설교기록');
  XLSX.writeFile(wb, `새김_설교기록_${todayStr()}.xlsx`);
}

async function exportQuietTimesXlsx() {
  const snap = await db.ref('quietTimes').once('value');
  const data = snap.val() || {};
  const rows = Object.values(data)
    .sort((a,b)=> (b.date||'').localeCompare(a.date||''))
    .map(q => ({
      날짜: q.date||'', 이름: q.userName||'', 소그룹: q.group||'',
      본문: q.verse||'', 메모: q.note||'',
      사진여부: q.hasPhoto ? 'O' : '-',

    }));

  ws['!cols'] = [{wch:12},{wch:10},{wch:14},{wch:16},{wch:40},{wch:8},{wch:18}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '묵상인증');
  XLSX.writeFile(wb, `새김_묵상인증_${todayStr()}.xlsx`);
}

/* =========================================================
   초기화 / 첫 관리자 자동 생성
   ========================================================= */
async function ensureFirstAdmin() {
  // 사용자가 한 명도 없으면 기본 admin 계정 생성 (admin / admin)
  const snap = await db.ref('users').limitToFirst(1).once('value');
  if (!snap.exists()) {
    await db.ref('users').push({
      name:'관리자', username:'admin', password:'admin', group:'관리', role:'admin', createdAt: Date.now()
    });
    console.log('[새김] 초기 관리자 계정 생성: admin / admin (반드시 비밀번호 변경하세요)');
  }
}

async function init() {
  try {
    await ensureFirstAdmin();
  } catch(e) {
    console.warn('Firebase 연결 확인 필요:', e.message);
  }
  // 세션 복원
  const saved = localStorage.getItem('saekim_session');
  if (saved) {
    try {
      state.me = JSON.parse(saved);
      enterApp();
      return;
    } catch(e){}
  }
}

init();
